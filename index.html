<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

:root{
  --bg:#0d0d0f;
  --s1:#111113;
  --s2:#18181c;
  --s3:#1f1f24;
  --s4:#27272e;
  --s5:#31313a;
  --border:rgba(255,255,255,0.06);
  --border2:rgba(255,255,255,0.1);
  --text:#f2f1f8;
  --text2:#9997b0;
  --text3:#4a4860;
  --acc:#e2e2f0;
  --acc2:#ffffff;
  --mono:'JetBrains Mono',monospace;
  --sans:'Outfit',sans-serif;
  --r:8px;
}
[data-theme="light"]{
  --bg:#f4f4f8;
  --s1:#ffffff;
  --s2:#f0f0f4;
  --s3:#e8e8ee;
  --s4:#dddde6;
  --s5:#d0d0dc;
  --border:rgba(0,0,0,0.07);
  --border2:rgba(0,0,0,0.12);
  --text:#0d0d14;
  --text2:#5a587a;
  --text3:#aaa8c0;
  --acc:#14141e;
  --acc2:#000000;
}

html,body{height:100%;overflow:hidden;font-family:var(--sans);font-size:14px;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;transition:background .2s,color .2s}
button{font-family:var(--sans);cursor:pointer;border:none;background:none}
input,textarea,select{font-family:var(--sans)}

/* ── APP SHELL ── */
.app{display:flex;flex-direction:column;height:100dvh;overflow:hidden}

/* ── NAV ── */
.nav{
  height:52px;display:flex;align-items:center;
  padding:0 12px;gap:8px;
  background:var(--s1);
  border-bottom:1px solid var(--border);
  flex-shrink:0;z-index:50;
}
.logo{
  display:flex;align-items:center;gap:9px;
  font-size:16px;font-weight:700;letter-spacing:-.4px;
  color:var(--text);white-space:nowrap;
}
.logo-gem{
  width:30px;height:30px;border-radius:8px;
  background:var(--text);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.logo-gem svg{width:16px;height:16px;fill:var(--bg)}

.nav-project{
  display:flex;align-items:center;gap:6px;
  background:var(--s3);border:1px solid var(--border);
  border-radius:6px;padding:5px 10px;
  font-size:12px;font-weight:500;color:var(--text2);
  cursor:pointer;transition:all .15s;max-width:160px;overflow:hidden;
  white-space:nowrap;text-overflow:ellipsis;
}
.nav-project:hover{background:var(--s4);color:var(--text)}

.nav-right{display:flex;align-items:center;gap:4px;margin-left:auto}

/* icon button */
.ib{
  width:32px;height:32px;border-radius:7px;
  display:flex;align-items:center;justify-content:center;
  color:var(--text2);transition:all .15s;flex-shrink:0;
}
.ib:hover{background:var(--s3);color:var(--text)}
.ib svg{width:15px;height:15px}

.run-btn{
  display:flex;align-items:center;gap:7px;
  padding:0 14px;height:32px;border-radius:7px;
  background:var(--text);color:var(--bg);
  font-size:12.5px;font-weight:700;letter-spacing:.2px;
  transition:all .15s;flex-shrink:0;
}
.run-btn:hover{opacity:.85;transform:translateY(-1px)}
.run-btn svg{width:12px;height:12px;fill:var(--bg)}

/* ── MOBILE PANEL TABS ── */
.mob-tabs{
  display:none;
  background:var(--s1);border-bottom:1px solid var(--border);
  padding:6px 12px;gap:4px;flex-shrink:0;
}
.mob-tab{
  flex:1;padding:7px 4px;border-radius:6px;
  font-size:12px;font-weight:600;color:var(--text3);
  transition:all .15s;letter-spacing:.1px;
  display:flex;align-items:center;justify-content:center;gap:5px;
}
.mob-tab.on{background:var(--s3);color:var(--text)}
.mob-tab svg{width:13px;height:13px}

/* ── WORKSPACE ── */
.ws{flex:1;display:flex;overflow:hidden;min-height:0}

/* ── PANELS ── */
.panel{
  display:flex;flex-direction:column;
  overflow:hidden;min-width:0;
}

.panel-head{
  height:38px;display:flex;align-items:center;
  padding:0 12px;gap:8px;
  background:var(--s1);border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.panel-label{
  font-size:10.5px;font-weight:700;
  color:var(--text3);text-transform:uppercase;letter-spacing:.9px;
}
.ph-right{display:flex;align-items:center;gap:3px;margin-left:auto}

/* ── EDITOR PANEL ── */
#p-editor{width:38%;border-right:1px solid var(--border);flex-shrink:0}

.editor-body{flex:1;position:relative;overflow:hidden}
.editor-drop{
  position:absolute;inset:0;z-index:30;
  background:rgba(242,241,248,.04);
  border:2px dashed rgba(242,241,248,.2);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:8px;
  display:none;pointer-events:none;
}
.editor-drop.on{display:flex}
.editor-drop p{font-size:14px;font-weight:600;color:var(--text)}
.editor-drop span{font-size:12px;color:var(--text3)}

#code{
  width:100%;height:100%;
  background:var(--bg);color:#c8c7e2;
  font-family:var(--mono);font-size:13px;line-height:1.75;
  padding:16px;border:none;outline:none;resize:none;
  tab-size:2;caret-color:var(--text);
  scrollbar-width:thin;scrollbar-color:var(--s4) transparent;
  display:block;
}
#code::placeholder{color:var(--text3);font-size:13px;line-height:2}
#code::-webkit-scrollbar{width:5px}
#code::-webkit-scrollbar-thumb{background:var(--s4);border-radius:3px}
[data-theme="light"] #code{color:#1e1d30}

/* ── DRAG HANDLE ── */
.drag-handle{
  width:4px;flex-shrink:0;cursor:col-resize;
  background:var(--border);transition:background .2s;
  position:relative;
}
.drag-handle:hover,.drag-handle.on{background:var(--text3)}

/* ── PREVIEW PANEL ── */
#p-preview{flex:1;border-right:1px solid var(--border)}

.browser-chrome{
  height:38px;display:flex;align-items:center;
  padding:0 10px;gap:8px;
  background:var(--s1);border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.b-dots{display:flex;gap:5px}
.bd{width:10px;height:10px;border-radius:50%}
.bd.r{background:#ff5f57}.bd.y{background:#febc2e}.bd.g{background:#28c840}

.url-bar{
  flex:1;height:25px;
  background:var(--s3);border-radius:5px;
  display:flex;align-items:center;padding:0 9px;gap:6px;
  font-family:var(--mono);font-size:11px;color:var(--text3);
  min-width:0;overflow:hidden;
}
.url-bar svg{width:10px;height:10px;flex-shrink:0}
#url-txt{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.preview-body{flex:1;position:relative;overflow:hidden}
.preview-empty{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:12px;pointer-events:none;
}
.pe-icon{
  width:52px;height:52px;border-radius:14px;
  background:var(--s2);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
}
.pe-icon svg{width:22px;height:22px;color:var(--text3)}
.preview-empty p{font-size:13px;color:var(--text3);font-weight:400}
.preview-empty kbd{
  background:var(--s3);border:1px solid var(--border2);
  border-radius:4px;padding:1px 7px;
  font-family:var(--mono);font-size:11px;color:var(--text2);
}

#frame{width:100%;height:100%;border:none;display:block;background:#fff}

/* ── CONSOLE PANEL ── */
#p-console{width:26%;flex-shrink:0}

.con-body{
  flex:1;overflow-y:auto;padding:8px 10px;
  font-family:var(--mono);font-size:11.5px;line-height:1.65;
  scrollbar-width:thin;scrollbar-color:var(--s4) transparent;
  background:var(--bg);
}
.con-body::-webkit-scrollbar{width:4px}
.con-body::-webkit-scrollbar-thumb{background:var(--s4)}

.log-row{
  display:flex;gap:8px;padding:2px 0;
  border-bottom:1px solid var(--border);
}
.log-time{color:var(--text3);font-size:10px;padding-top:2px;flex-shrink:0;min-width:48px}
.log-msg{color:var(--text2);word-break:break-all;flex:1;white-space:pre-wrap}
.log-msg.er{color:#f87171}
.log-msg.wn{color:#fbbf24}
.log-msg.in{color:#818cf8}
.log-msg.ok{color:#34d399}

.con-input-row{
  height:34px;display:flex;align-items:center;gap:6px;
  padding:0 10px;border-top:1px solid var(--border);
  background:var(--s1);flex-shrink:0;
}
.con-prompt{font-family:var(--mono);font-size:13px;color:var(--text3)}
.con-in{
  flex:1;background:none;border:none;outline:none;
  font-family:var(--mono);font-size:12px;color:var(--text);
  caret-color:var(--text);
}
.con-in::placeholder{color:var(--text3)}
.err-cnt{
  display:none;background:#f87171;color:#fff;
  font-size:10px;font-weight:700;padding:1px 5px;border-radius:3px;
}
.err-cnt.on{display:inline}

/* ── STATUSBAR ── */
.statusbar{
  height:24px;display:flex;align-items:center;
  padding:0 14px;gap:16px;
  background:var(--s1);border-top:1px solid var(--border);
  flex-shrink:0;
}
.st{
  font-family:var(--mono);font-size:10.5px;color:var(--text3);
  display:flex;align-items:center;gap:4px;
}
.st-live{width:5px;height:5px;border-radius:50%;background:#34d399;animation:pulse 3s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
#st-msg{margin-left:auto}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:32px;left:50%;
  transform:translateX(-50%) translateY(10px);
  background:var(--s3);border:1px solid var(--border2);
  color:var(--text);font-size:12.5px;font-weight:500;
  padding:7px 18px;border-radius:20px;
  opacity:0;pointer-events:none;z-index:999;
  transition:all .25s cubic-bezier(.4,0,.2,1);white-space:nowrap;
}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── MODAL ── */
.modal-bg{
  position:fixed;inset:0;background:rgba(0,0,0,.7);
  backdrop-filter:blur(6px);z-index:200;
  display:none;align-items:center;justify-content:center;
  padding:16px;
}
.modal-bg.on{display:flex}
.modal{
  background:var(--s2);border:1px solid var(--border2);
  border-radius:14px;width:100%;max-width:420px;
  max-height:90dvh;display:flex;flex-direction:column;
  overflow:hidden;
}
.modal-head{
  padding:18px 20px 14px;display:flex;align-items:center;
  border-bottom:1px solid var(--border);
}
.modal-title{font-size:15px;font-weight:700}
.modal-x{
  margin-left:auto;width:28px;height:28px;border-radius:6px;
  background:var(--s4);color:var(--text2);
  display:flex;align-items:center;justify-content:center;
  font-size:16px;cursor:pointer;transition:all .15s;
}
.modal-x:hover{background:var(--s5);color:var(--text)}
.modal-body{padding:16px 20px;overflow-y:auto;flex:1}
.modal-footer{
  padding:12px 20px;border-top:1px solid var(--border);
  display:flex;gap:8px;justify-content:flex-end;
}

/* ── PROJECTS LIST ── */
.proj-list{display:flex;flex-direction:column;gap:6px}
.proj-item{
  display:flex;align-items:center;gap:10px;
  padding:10px 12px;border-radius:8px;
  border:1px solid var(--border);background:var(--s3);
  cursor:pointer;transition:all .15s;
}
.proj-item:hover{background:var(--s4);border-color:var(--border2)}
.proj-item.active{border-color:var(--text3)}
.proj-icon{
  width:32px;height:32px;border-radius:7px;
  background:var(--s4);display:flex;align-items:center;justify-content:center;
  flex-shrink:0;font-size:14px;
}
.proj-info{flex:1;min-width:0}
.proj-name{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.proj-meta{font-size:11px;color:var(--text3);margin-top:1px}
.proj-del{
  width:26px;height:26px;border-radius:5px;
  color:var(--text3);display:flex;align-items:center;justify-content:center;
  transition:all .15s;flex-shrink:0;
}
.proj-del:hover{background:#f8717130;color:#f87171}
.proj-del svg{width:13px;height:13px}

.proj-empty{
  text-align:center;padding:32px 0;color:var(--text3);
  font-size:13px;line-height:1.8;
}

/* ── SETTINGS ── */
.setting-section{margin-bottom:18px}
.setting-section-title{
  font-size:10.5px;font-weight:700;text-transform:uppercase;
  letter-spacing:.9px;color:var(--text3);margin-bottom:10px;
}
.setting-row{
  display:flex;align-items:center;justify-content:space-between;
  gap:12px;padding:8px 0;border-bottom:1px solid var(--border);
}
.setting-row:last-child{border-bottom:none}
.setting-lbl{font-size:13px;color:var(--text2)}

/* Toggle */
.tog{position:relative;width:40px;height:22px;cursor:pointer}
.tog input{display:none}
.tog-track{
  width:40px;height:22px;background:var(--s5);
  border-radius:11px;display:block;transition:background .2s;
}
.tog input:checked+.tog-track{background:var(--text)}
.tog-thumb{
  position:absolute;top:3px;left:3px;
  width:16px;height:16px;background:var(--bg);
  border-radius:50%;transition:transform .2s;pointer-events:none;
  box-shadow:0 1px 3px rgba(0,0,0,.3);
}
.tog input:checked~.tog-thumb{transform:translateX(18px)}
[data-theme="light"] .tog-thumb{background:#fff}

.sel{
  background:var(--s3);border:1px solid var(--border);
  border-radius:6px;color:var(--text);
  font-family:var(--sans);font-size:12px;
  padding:4px 8px;outline:none;cursor:pointer;
}

/* ── FORM ── */
.form-field{margin-bottom:14px}
.form-label{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px;display:block}
.form-input{
  width:100%;background:var(--s3);
  border:1px solid var(--border);border-radius:7px;
  color:var(--text);font-family:var(--sans);font-size:13px;
  padding:9px 12px;outline:none;transition:border .15s;
}
.form-input:focus{border-color:var(--border2)}

/* ── BUTTONS ── */
.btn{
  display:flex;align-items:center;gap:6px;
  padding:8px 16px;border-radius:7px;
  font-size:13px;font-weight:600;
  cursor:pointer;transition:all .15s;border:none;
}
.btn-primary{background:var(--text);color:var(--bg)}
.btn-primary:hover{opacity:.85}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--s3);color:var(--text)}
.btn-danger{background:#f8717120;color:#f87171;border:1px solid #f8717130}
.btn-danger:hover{background:#f8717130}

/* ── MOBILE RESPONSIVE ── */
@media(max-width:768px){
  .mob-tabs{display:flex}
  .drag-handle{display:none}
  #p-editor,#p-preview,#p-console{
    position:absolute;inset:0;
    width:100% !important;
    border-right:none;
  }
  .ws{position:relative}
  #p-editor,#p-preview,#p-console{display:none}
  #p-editor.mob-on,#p-preview.mob-on,#p-console.mob-on{display:flex}
  .nav-project{max-width:110px}
  .logo span{display:none}
}
@media(max-width:480px){
  .nav{padding:0 8px;gap:4px;height:48px}
  .run-btn span{display:none}
  .run-btn{padding:0 10px}
}

/* ── SCROLLBAR GLOBAL ── */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--s4);border-radius:3px}
</style>
</head>
<body>
<div class="app">

<!-- NAV -->
<nav class="nav">
  <div class="logo">
    <div class="logo-gem">
      <svg viewBox="0 0 16 16" fill="currentColor"><path d="M3 13V3h2.5l5 7V3H13v10h-2.5l-5-7v7z"/></svg>
    </div>
    <span>Nexlit</span>
  </div>

  <div class="nav-project" id="nav-proj" onclick="openProjects()" title="Projects">
    <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="2" width="5" height="5" rx="1"/><rect x="9" y="2" width="5" height="5" rx="1"/><rect x="2" y="9" width="5" height="5" rx="1"/><rect x="9" y="9" width="5" height="5" rx="1"/></svg>
    <span id="nav-proj-name">Untitled</span>
  </div>

  <div class="nav-right">
    <button class="ib" onclick="saveProject()" title="Save (Ctrl+S)">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 2h9l3 3v9a1 1 0 01-1 1H2a1 1 0 01-1-1V3a1 1 0 011-1z"/><rect x="5" y="9" width="6" height="5" rx=".5"/><rect x="5" y="2" width="4" height="3" rx=".5"/></svg>
    </button>
    <button class="ib" onclick="newProject()" title="New Project">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 3v10M3 8h10"/></svg>
    </button>
    <button class="ib" onclick="downloadCode()" title="Export HTML">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 2v8M5 7l3 3 3-3"/><path d="M3 12h10"/></svg>
    </button>
    <button class="ib" onclick="openSettings()" title="Settings">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="2.5"/><path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.2 3.2l1.4 1.4M11.4 11.4l1.4 1.4M3.2 12.8l1.4-1.4M11.4 4.6l1.4-1.4"/></svg>
    </button>
    <div style="width:1px;height:18px;background:var(--border);margin:0 2px"></div>
    <button class="run-btn" onclick="run()" title="Run (Ctrl+Enter)">
      <svg viewBox="0 0 16 16"><path d="M5 3.5l8 4.5-8 4.5z"/></svg>
      <span>Run</span>
    </button>
  </div>
</nav>

<!-- MOBILE TABS -->
<div class="mob-tabs" id="mob-tabs">
  <button class="mob-tab on" onclick="mobTab('editor',this)">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="4,6 2,8 4,10"/><polyline points="12,6 14,8 12,10"/><line x1="9" y1="3" x2="7" y2="13"/></svg>
    Editor
  </button>
  <button class="mob-tab" onclick="mobTab('preview',this)">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="3" width="14" height="10" rx="2"/><path d="M1 7h14"/></svg>
    Preview
  </button>
  <button class="mob-tab" onclick="mobTab('console',this)">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="2,5 7,8 2,11"/><line x1="9" y1="11" x2="14" y2="11"/></svg>
    Console

<script>
/* ════════════════════════════════════════
   NEXLIT — Full Studio JS
════════════════════════════════════════ */

// ── STATE ──
let currentProject = null;
let errCount = 0;
let autoRunTimer;
let settings = {theme:'dark',fs:'13',wrap:false,tab:2,ar:false,delay:2000};

// ── TEMPLATES ──
const TEMPLATES = [
  {id:'blank',icon:'📄',label:'Blank',code:'<!DOCTYPE html>\n<html lang="en">\n<head>\n  <meta charset="UTF-8">\n  <meta name="viewport" content="width=device-width, initial-scale=1.0">\n  <title>My Page</title>\n  <style>\n    body {\n      font-family: sans-serif;\n      margin: 0;\n      padding: 2rem;\n    }\n  </style>\n</head>\n<body>\n  <h1>Hello World</h1>\n</body>\n</html>'},
  {id:'landing',icon:'🌐',label:'Landing',code:'<!DOCTYPE html>\n<html lang="en">\n<head>\n  <meta charset="UTF-8">\n  <meta name="viewport" content="width=device-width, initial-scale=1.0">\n  <title>Landing Page</title>\n  <style>\n    *{margin:0;padding:0;box-sizing:border-box}\n    body{font-family:system-ui,sans-serif;background:#0a0a0a;color:#f0f0f0;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem}\n    h1{font-size:clamp(2rem,6vw,4rem);font-weight:800;margin-bottom:1rem;background:linear-gradient(135deg,#fff,#888);-webkit-background-clip:text;-webkit-text-fill-color:transparent}\n    p{color:#888;font-size:1.1rem;max-width:500px;line-height:1.7;margin-bottom:2rem}\n    .btn{display:inline-block;background:#fff;color:#000;padding:12px 32px;border-radius:50px;font-weight:700;text-decoration:none;transition:opacity .2s}\n    .btn:hover{opacity:.8}\n  </style>\n</head>\n<body>\n  <h1>Your Big Headline</h1>\n  <p>A short description of what you do and why people should care about it.</p>\n  <a href="#" class="btn">Get Started</a>\n</body>\n</html>'},
  {id:'card',icon:'🃏',label:'Card',code:'<!DOCTYPE html>\n<html>\n<head>\n  <meta charset="UTF-8">\n  <title>Card</title>\n  <style>\n    body{font-family:system-ui,sans-serif;background:#f0f0f0;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0}\n    .card{background:#fff;border-radius:16px;padding:2rem;max-width:360px;width:90%;box-shadow:0 8px 32px rgba(0,0,0,.1)}\n    .avatar{width:64px;height:64px;border-radius:50%;background:#e0e0e0;margin-bottom:1rem}\n    h2{margin:0 0 .5rem;font-size:1.25rem}\n    p{color:#666;margin:0 0 1.5rem;line-height:1.6}\n    .tags{display:flex;gap:8px;flex-wrap:wrap}\n    .tag{background:#f0f0f0;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600;color:#444}\n  </style>\n</head>\n<body>\n  <div class="card">\n    <div class="avatar"></div>\n    <h2>Alex Johnson</h2>\n    <p>Full-stack developer who loves building clean, minimal interfaces.</p>\n    <div class="tags"><span class="tag">React</span><span class="tag">TypeScript</span><span class="tag">Design</span></div>\n  </div>\n</body>\n</html>'},
  {id:'animation',icon:'✨',label:'Animation',code:'<!DOCTYPE html>\n<html>\n<head>\n  <meta charset="UTF-8">\n  <title>Animation</title>\n  <style>\n    *{margin:0;padding:0;box-sizing:border-box}\n    body{background:#000;display:flex;align-items:center;justify-content:center;min-height:100vh;overflow:hidden}\n    .orb{width:200px;height:200px;border-radius:50%;background:conic-gradient(from 0deg,#6366f1,#ec4899,#f59e0b,#10b981,#6366f1);animation:spin 3s linear infinite;filter:blur(0px)}\n    .orb::before{content:\'\';position:absolute;inset:20px;border-radius:50%;background:#000}\n    @keyframes spin{to{transform:rotate(360deg)}}\n    h1{position:absolute;color:#fff;font-family:system-ui;font-size:1.5rem;font-weight:800;letter-spacing:-.5px}\n  </style>\n</head>\n<body>\n  <div style="position:relative;display:flex;align-items:center;justify-content:center">\n    <div class="orb"></div>\n    <h1>Nexlit</h1>\n  </div>\n</body>\n</html>'},
];

// ── PROJECTS (localStorage) ──
function getProjects() {
  try { return JSON.parse(localStorage.getItem('nexlit_projects') || '[]'); } catch { return []; }
}
function saveProjects(p) { localStorage.setItem('nexlit_projects', JSON.stringify(p)); }

function getCode() { return document.getElementById('code').value; }
function setCode(v) { document.getElementById('code').value = v; onEdInput(); }

function saveProject() {
  if (!currentProject) { openNewModal(); return; }
  const ps = getProjects();
  const i = ps.findIndex(p => p.id === currentProject.id);
  const updated = {...currentProject, code: getCode(), updated: Date.now()};
  if (i >= 0) ps[i] = updated; else ps.unshift(updated);
  saveProjects(ps);
  currentProject = updated;
  toast('Saved');
}

function loadProject(p) {
  currentProject = p;
  setCode(p.code || '');
  document.getElementById('nav-proj-name').textContent = p.name;
  closeModal('m-projects');
  toast('Opened: ' + p.name);
  if (p.code) run();
}

function deleteProject(id, e) {
  e.stopPropagation();
  if (!confirm('Delete this project?')) return;
  let ps = getProjects().filter(p => p.id !== id);
  saveProjects(ps);
  if (currentProject?.id === id) {
    currentProject = null;
    document.getElementById('nav-proj-name').textContent = 'Untitled';
    clearEditor();
  }
  renderProjects();
  toast('Deleted');
}

function renderProjects() {
  const ps = getProjects();
  const el = document.getElementById('proj-list');
  if (!ps.length) {
    el.innerHTML = '<div class="proj-empty">No projects yet.<br>Create one to get started.</div>';
    return;
  }
  el.innerHTML = ps.map(p => `
    <div class="proj-item${currentProject?.id===p.id?' active':''}" onclick="loadProject(${JSON.stringify(p).replace(/"/g,'&quot;')})">
      <div class="proj-icon">${p.icon||'📄'}</div>
      <div class="proj-info">
        <div class="proj-name">${esc(p.name)}</div>
        <div class="proj-meta">${fmtDate(p.updated||p.created)}</div>
      </div>
      <button class="proj-del" onclick="deleteProject('${p.id}',event)" title="Delete">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 4h10M6 4V2h4v2M5 4l.5 9h5l.5-9"/></svg>
      </button>
    </div>
  `).join('');
}

function fmtDate(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  const now = new Date();
  const diff = (now - d) / 1000;
  if (diff < 60) return 'just now';
  if (diff < 3600) return Math.floor(diff/60) + 'm ago';
  if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
  return d.toLocaleDateString();
}

function openProjects() { renderProjects(); openModal('m-projects'); }

function newProject() { closeModal('m-projects'); openNewModal(); }

function openNewModal() {
  document.getElementById('new-name').value = '';
  renderTemplates();
  openModal('m-new');
  setTimeout(() => document.getElementById('new-name').focus(), 100);
}

let selectedTpl = 'blank';
function renderTemplates() {
  selectedTpl = 'blank';
  document.getElementById('tpl-grid').innerHTML = TEMPLATES.map(t => `
    <div id="tpl-${t.id}" onclick="selectTpl('${t.id}')"
      style="padding:10px;border-radius:8px;border:2px solid var(--border);cursor:pointer;text-align:center;transition:all .15s;background:var(--s3)${t.id==='blank'?';border-color:var(--border2)':''}">
      <div style="font-size:20px;margin-bottom:4px">${t.icon}</div>
      <div style="font-size:12px;font-weight:600;color:var(--text2)">${t.label}</div>
    </div>
  `).join('');
}

function selectTpl(id) {
  selectedTpl = id;
  TEMPLATES.forEach(t => {
    const el = document.getElementById('tpl-'+t.id);
    if (el) el.style.borderColor = t.id === id ? 'var(--border2)' : 'var(--border)';
  });
}

function createProject() {
  const name = document.getElementById('new-name').value.trim() || 'Untitled';
  const tpl = TEMPLATES.find(t => t.id === selectedTpl) || TEMPLATES[0];
  const proj = {
    id: 'p_' + Date.now(),
    name,
    icon: tpl.icon,
    code: tpl.code,
    created: Date.now(),
    updated: Date.now()
  };
  const ps = getProjects();
  ps.unshift(proj);
  saveProjects(ps);
  closeModal('m-new');
  loadProject(proj);
}

// ── RUN ──
function run() {
  const code = getCode().trim();
  if (!code) { toast('Nothing to run'); return; }

  document.getElementById('pv-empty').style.display = 'none';
  document.getElementById('url-txt').textContent = 'nexlit://preview';
  errCount = 0; updateBadge();

  const bridge = `<script>(function(){
    var _s=function(l,a){try{parent.postMessage({t:'log',l:l,m:Array.from(a).map(function(x){try{return typeof x==='object'?JSON.stringify(x,null,2):String(x)}catch(e){return String(x)}}).join(' ')},'*')}catch(e){}};
    console.log=function(){_s('log',arguments)};
    console.error=function(){_s('er',arguments)};
    console.warn=function(){_s('wn',arguments)};
    console.info=function(){_s('in',arguments)};
    window.onerror=function(m,s,l){_s('er',['Line '+l+': '+m])};
  })()\<\/script>`;

  let html = code;
  const lo = html.toLowerCase();
  const isFull = lo.includes('<!doctype') || lo.includes('<html');

  if (!isFull) {
    const noTags = !html.includes('<');
    const isCSS = noTags && /[{;}]/.test(html) && !html.includes('function') && !html.includes('=>');
    const isJS = noTags && (html.includes('function') || html.includes('=>') || html.includes('const ') || html.includes('let ') || html.includes('document.'));
    if (isCSS) html = `<!DOCTYPE html><html><head><meta charset="UTF-8"><style>${html}</style></head><body><p style="font-family:sans-serif;padding:2rem;color:#888">CSS loaded — add HTML to see styling.</p></body></html>`;
    else if (isJS) html = `<!DOCTYPE html><html><head><meta charset="UTF-8"></head><body><script>${html}\<\/script></html>`;
    else html = `<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"></head><body>${html}</body></html>`;
  }

  if (html.toLowerCase().includes('<head>')) html = html.replace(/<head>/i, '<head>' + bridge);
  else html = bridge + html;

  document.getElementById('frame').srcdoc = html;
  conLog('in', '▶ Executed');
  setMsg('Live');
  toast('Preview updated');

  // auto-save if project exists
  if (currentProject) {
    const ps = getProjects();
    const i = ps.findIndex(p => p.id === currentProject.id);
    if (i >= 0) { ps[i].code = getCode(); ps[i].updated = Date.now(); saveProjects(ps); currentProject = ps[i]; }
  }
}

// ── CONSOLE ──
window.addEventListener('message', e => {
  if (e.data?.t === 'log') conLog(e.data.l, e.data.m);
});

function conLog(level, msg) {
  const el = document.getElementById('con-body');
  const now = new Date().toTimeString().slice(0,8);
  const row = document.createElement('div');
  row.className = 'log-row';
  const cls = {er:'er',wn:'wn',in:'in',ok:'ok'}[level] || '';
  row.innerHTML = `<span class="log-time">${now}</span><span class="log-msg ${cls}">${esc(msg)}</span>`;
  el.appendChild(row);
  el.scrollTop = el.scrollHeight;
  if (level === 'er') { errCount++; updateBadge(); }
}

function updateBadge() {
  const b = document.getElementById('err-cnt');
  b.textContent = errCount;
  b.classList.toggle('on', errCount > 0);
}

function clearCon() {
  document.getElementById('con-body').innerHTML = '';
  errCount = 0; updateBadge();
}

function execJS(e) {
  if (e.key !== 'Enter') return;
  const inp = document.getElementById('con-in');
  const cmd = inp.value.trim();
  if (!cmd) return;
  inp.value = '';
  conLog('log', '› ' + cmd);
  try { document.getElementById('frame').contentWindow.eval(cmd); }
  catch (err) { conLog('er', err.message); }
}

// ── EDITOR ──
function onEdInput() {
  const v = getCode();
  const lines = v.split('\n').length;
  document.getElementById('st-lines').textContent = lines + ' lines';
  document.getElementById('st-chars').textContent = v.length + ' chars';
  const lang = detectLang(v);
  document.getElementById('st-lang').textContent = lang;
  document.getElementById('ed-lang').textContent = lang;

  clearTimeout(autoRunTimer);
  const delay = parseInt(document.getElementById('sel-delay')?.value || 0);
  if (delay > 0 && v.trim()) autoRunTimer = setTimeout(run, delay);
}

function detectLang(c) {
  const l = c.toLowerCase();
  if (l.includes('<!doctype') || l.includes('<html') || l.includes('<head') || l.includes('<body')) return 'HTML';
  if (!c.includes('<') && c.includes('{') && c.includes(':')) return 'CSS';
  if (!c.includes('<') && (c.includes('function') || c.includes('=>') || c.includes('const '))) return 'JS';
  return 'HTML';
}

function onEdKey(e) {
  if (e.key === 'Tab') {
    e.preventDefault();
    const ta = e.target;
    const ts = parseInt(document.getElementById('sel-tab')?.value || 2);
    const sp = ' '.repeat(ts);
    const s = ta.selectionStart, end = ta.selectionEnd;
    ta.value = ta.value.slice(0,s) + sp + ta.value.slice(end);
    ta.selectionStart = ta.selectionEnd = s + ts;
    onEdInput();
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') { e.preventDefault(); run(); }
  if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); saveProject(); }
}

function clearEditor() {
  setCode('');
  document.getElementById('frame').srcdoc = '';
  document.getElementById('pv-empty').style.display = '';
  document.getElementById('url-txt').textContent = 'about:blank';
  clearCon(); setMsg('Ready'); toast('Cleared');
}

function copyCode() {
  const v = getCode();
  if (!v) { toast('Nothing to copy'); return; }
  navigator.clipboard.writeText(v).then(() => toast('Copied'));
}

function downloadCode() {
  const v = getCode();
  if (!v) { toast('Nothing to export'); return; }
  const b = new Blob([v], {type:'text/html'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(b);
  a.download = (currentProject?.name || 'nexlit') + '.html';
  a.click();
  toast('Exported');
}

function formatCode() {
  const ta = document.getElementById('code');
  let code = ta.value;
  if (!code.trim()) { toast('Nothing to format'); return; }
  try {
    let depth = 0;
    const voids = new Set(['area','base','br','col','embed','hr','img','input','link','meta','param','source','track','wbr']);
    const lines = code.split('\n');
    const result = lines.map(raw => {
      let line = raw.trim();
      if (!line) return '';
      const isClose = /^<\//.test(line);
      const isSelfClose = /\/>$/.test(line) || voids.has((line.match(/^<(\w+)/)||[])[1]||'');
      const isOpen = /^<[^/!]/.test(line) && !isSelfClose;
      if (isClose) depth = Math.max(0, depth - 1);
      const out = '  '.repeat(depth) + line;
      if (isOpen) depth++;
      return out;
    });
    ta.value = result.join('\n');
    onEdInput();
    toast('Formatted');
  } catch { toast('Could not format'); }
}

function loadFile(e) {
  const f = e.target.files[0];
  if (!f) return;
  const r = new FileReader();
  r.onload = ev => {
    setCode(ev.target.result);
    toast('Loaded ' + f.name);
    run();
  };
  r.readAsText(f);
  e.target.value = '';
}

// ── DRAG & DROP ──
const edBody = document.getElementById('ed-body');
const edDrop = document.getElementById('ed-drop');

edBody.addEventListener('dragover', e => { e.preventDefault(); edDrop.classList.add('on'); });
edBody.addEventListener('dragleave', e => { if (!edBody.contains(e.relatedTarget)) edDrop.classList.remove('on'); });
edBody.addEventListener('drop', e => {
  e.preventDefault(); edDrop.classList.remove('on');
  const f = e.dataTransfer.files[0];
  if (!f) return;
  const r = new FileReader();
  r.onload = ev => { setCode(ev.target.result); toast('Loaded ' + f.name); run(); };
  r.readAsText(f);
});

// ── RESIZE PANELS ──
let dragging = false, dragTarget = '', dragStart, dragW;

function startDrag(e, target) {
  dragging = true; dragTarget = target;
  dragStart = e.clientX;
  const el = target === 'editor' ? document.getElementById('p-editor') : document.getElementById('p-console');
  dragW = el.offsetWidth;
  document.getElementById('dh1').classList.toggle('on', target==='editor');
  document.getElementById('dh2').classList.toggle('on', target==='console');
  document.body.style.cursor = 'col-resize';
  document.body.style.userSelect = 'none';
  document.getElementById('frame').style.pointerEvents = 'none';
}

document.addEventListener('mousemove', e => {
  if (!dragging) return;
  const wsW = document.getElementById('ws').offsetWidth;
  const delta = e.clientX - dragStart;
  if (dragTarget === 'editor') {
    const newW = Math.max(200, Math.min(wsW * .6, dragW + delta));
    document.getElementById('p-editor').style.width = newW + 'px';
  } else {
    const newW = Math.max(180, Math.min(wsW * .45, dragW - delta));
    document.getElementById('p-console').style.width = newW + 'px';
  }
});

document.addEventListener('mouseup', () => {
  if (!dragging) return;
  dragging = false;
  document.getElementById('dh1').classList.remove('on');
  document.getElementById('dh2').classList.remove('on');
  document.body.style.cursor = '';
  document.body.style.userSelect = '';
  document.getElementById('frame').style.pointerEvents = '';
});

// ── MOBILE TABS ──
function mobTab(panel, btn) {
  document.querySelectorAll('.mob-tab').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  ['p-editor','p-preview','p-console'].forEach(id => {
    document.getElementById(id).classList.remove('mob-on');
  });
  const map = {editor:'p-editor', preview:'p-preview', console:'p-console'};
  document.getElementById(map[panel]).classList.add('mob-on');
  if (panel === 'preview' && !document.getElementById('frame').srcdoc && getCode()) run();
}

// ── PREVIEW UTILS ──
function refresh() {
  const f = document.getElementById('frame');
  const s = f.srcdoc;
  if (s) { f.srcdoc = ''; requestAnimationFrame(() => f.srcdoc = s); }
}

function goFS() {
  const el = document.querySelector('.preview-body');
  (el.requestFullscreen || el.webkitRequestFullscreen || (()=>{})).call(el);
}

// ── MODALS ──
function openModal(id) { document.getElementById(id).classList.add('on'); }
function closeModal(id, e) {
  if (e && e.target !== document.getElementById(id)) return;
  document.getElementById(id).classList.remove('on');
}
function openSettings() { loadSettingsUI(); openModal('m-settings'); }

// ── SETTINGS ──
function loadSettingsUI() {
  document.getElementById('tog-theme').checked = settings.theme === 'light';
  document.getElementById('sel-fs').value = settings.fs;
  document.getElementById('tog-wrap').checked = settings.wrap;
  document.getElementById('sel-tab').value = settings.tab;
  document.getElementById('tog-ar').checked = settings.ar;
}
function saveSettings() { localStorage.setItem('nexlit_settings', JSON.stringify(settings)); }
function applyTheme() {
  settings.theme = document.getElementById('tog-theme').checked ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', settings.theme);
  saveSettings();
}
function applyFS(v) { settings.fs = v; document.getElementById('code').style.fontSize = v + 'px'; saveSettings(); }
function applyWrap() { settings.wrap = document.getElementById('tog-wrap').checked; document.getElementById('code').style.whiteSpace = settings.wrap ? 'pre-wrap' : 'pre'; saveSettings(); }

// ── STATUS ──
function setMsg(m) { document.getElementById('st-msg').textContent = m; }

// ── TOAST ──
let toastT;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('on');
  clearTimeout(toastT);
  toastT = setTimeout(() => el.classList.remove('on'), 2200);
}

// ── UTILS ──
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── KEYBOARD SHORTCUTS ──
document.addEventListener('keydown', e => {
  if ((e.ctrlKey||e.metaKey) && e.key==='Enter') run();
  if ((e.ctrlKey||e.metaKey) && e.key==='s') { e.preventDefault(); saveProject(); }
  if (e.key==='Escape') ['m-projects','m-new','m-settings'].forEach(id => document.getElementById(id).classList.remove('on'));
});

// ── PASTE AUTO-RUN ──
document.getElementById('code').addEventListener('paste', () => {
  setTimeout(() => { onEdInput(); if (document.getElementById('tog-ar')?.checked) run(); }, 100);
});

// ── PWA SERVICE WORKER ──
if ('serviceWorker' in navigator) {
  const swCode = `
    const CACHE='nexlit-v1';
    self.addEventListener('install',e=>{self.skipWaiting()});
    self.addEventListener('fetch',e=>{e.respondWith(fetch(e.request).catch(()=>caches.match(e.request)))});
  `;
  const blob = new Blob([swCode], {type:'text/javascript'});
  const url = URL.createObjectURL(blob);
  navigator.serviceWorker.register(url).catch(()=>{});
}

// ── INIT ──
(function init() {
  // Load settings
  try {
    const s = JSON.parse(localStorage.getItem('nexlit_settings') || '{}');
    Object.assign(settings, s);
  } catch {}
  document.documentElement.setAttribute('data-theme', settings.theme);
  document.getElementById('code').style.fontSize = settings.fs + 'px';
  if (settings.wrap) document.getElementById('code').style.whiteSpace = 'pre-wrap';

  // Load last project
  const ps = getProjects();
  if (ps.length > 0) {
    currentProject = ps[0];
    document.getElementById('nav-proj-name').textContent = ps[0].name;
    setCode(ps[0].code || '');
    if (ps[0].code) run();
  }

  conLog('in', 'Nexlit ready. Ctrl+Enter to run, Ctrl+S to save.');
  setMsg('Ready');
  onEdInput();
})();
</script>
